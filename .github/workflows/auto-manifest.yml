name: Auto Update Content Manifest

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: auto-manifest
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, 'auto: update manifest')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure content directories exist
        run: |
          mkdir -p content/news content/articles content/survey-data content/videos content/history

      - name: Generate manifest.json
        run: |
          cat > gen_manifest.py << 'PYEOF'
          import os, json

          collections = ["news", "articles", "survey-data", "videos", "history"]
          manifest = {}

          for col in collections:
              d = os.path.join("content", col)
              files = []
              if os.path.isdir(d):
                  for f in sorted(os.listdir(d), reverse=True):
                      if f.endswith('.md'):
                          files.append(f"{col}/{f}")
              manifest[col] = files

          with open("content/manifest.json", "w", encoding="utf-8") as fp:
              json.dump(manifest, fp, indent=2, ensure_ascii=False)
          
          print(f"manifest.json generated: {sum(len(v) for v in manifest.values())} files total")
          PYEOF
          python3 gen_manifest.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --exit-code content/manifest.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated manifest
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/manifest.json
          git diff --cached --quiet && echo "No staged changes" && exit 0
          git commit -m "auto: update manifest.json [skip ci]"
          git push
