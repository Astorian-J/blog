<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平衡推荐汇总 - 中国社区昆特平衡数据库</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #fafafa;
            --accent: #2563eb;
            --border: #e5e5e5;
            --nav-bg: rgba(255,255,255,0.92);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg); color: #1a1a1a; line-height: 1.6; min-height: 100vh;
        }

        /* 导航栏 */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: var(--nav-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
            justify-content: space-between; padding: 0 40px; z-index: 1000;
        }
        .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; text-decoration: none; color: #1a1a1a; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 24px; font-size: 14px; font-weight: 500; color: #555; }
        .nav-links a { text-decoration: none; color: inherit; transition: color 0.2s; }
        .nav-links a:hover { color: var(--accent); }

        /* 主内容 */
        .main-content { max-width: 1100px; margin: 0 auto; padding: 80px 24px 48px; }

        /* 标题区 */
        .page-title-area { text-align: center; margin-bottom: 28px; }
        .page-title { font-size: 26px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
        .page-subtitle { font-size: 14.5px; color: #999; }
        .month-badge {
            display: inline-block; padding: 4px 18px; border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: #fff; font-size: 14.5px; font-weight: 600; margin-top: 8px;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13.5px; color: var(--accent); font-weight: 500;
            margin-bottom: 20px; transition: opacity 0.2s; text-decoration: none;
        }
        .back-link:hover { opacity: 0.7; }

        /* 图片容器 — 铺满 */
        .image-container {
            width: 100%; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08); background: #f0f0f0;
        }
        .image-container img {
            display: block; width: 100%; height: auto;
        }

        /* 空状态 */
        .empty-state {
            text-align: center; padding: 80px 24px; color: #999; font-size: 14.5px;
        }

        footer {
            text-align: center; padding: 24px; font-size: 12px;
            color: #bbb; border-top: 1px solid var(--border);
            margin-top: 32px;
        }

        @media (max-width: 640px) {
            .navbar { padding: 0 20px; }
            .main-content { padding: 72px 16px 36px; }
            .page-title { font-size: 22px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo"><a href="./" style="text-decoration:none;color:inherit;">昆特<span>平衡数据库</span></a></div>
    <div class="nav-links">
        <a href="./">首页</a>
    </div>
</nav>

<main class="main-content">

    <a href="./" class="back-link">&larr; 返回首页</a>

    <div class="page-title-area">
        <h1 class="page-title">平衡推荐汇总</h1>
        <p class="page-subtitle" id="seasonLabel"></p>
        <span class="month-badge" id="monthBadge"></span>
    </div>

    <div id="imageArea"></div>

</main>

<footer>
    <p>&copy; 2026 中国社区昆特平衡数据库</p>
</footer>

<script>
// ===== 月份自动更新 =====
(function setMonthTitle() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth() + 1;
    const monthNames = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];
    document.getElementById('seasonLabel').textContent = `${year}年${monthNames[month-1]}月赛季`;
    document.getElementById('monthBadge').textContent = `${year}.${String(month).padStart(2,'0')}`;
})();

// ===== 加载最新图片 =====
(async function loadImage() {
    const container = document.getElementById('imageArea');

    // 扫描最近的文件（按日期倒序，找到第一个有图片的）
    const now = new Date();
    const candidates = [];
    for (let i = 0; i < 15; i++) {
        const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
        const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        candidates.push(`content/bc-recommendations/${ds}.md`);
    }

    for (const f of candidates) {
        try {
            const r = await fetch('./' + f);
            if (!r.ok) continue;
            const text = await r.text();
            const fm = parseFM(text).frontmatter;
            if (fm.image) {
                // 标准化路径
                let src = fm.image.trim();
                if (src && !src.startsWith('http') && !src.startsWith('//')) {
                    src = src.replace(/^\.\.\//, '').replace(/^\.\//, '');
                }
                if (src) {
                    container.innerHTML = `<div class="image-container"><img src="${src}" alt="平衡推荐截图" loading="lazy"></div>`;
                    return;
                }
            }
        } catch(e) {}
    }

    // 没有图片
    container.innerHTML = `<div class="empty-state">暂无本月推荐图片</div>`;
})();

function parseFM(content) {
    if (!content.startsWith('---')) return { frontmatter: {}, body: content };
    const end = content.indexOf('---', 3);
    if (end < 0) return { frontmatter: {}, body: content };
    const fmText = content.slice(3, end).trim();
    const body = content.slice(end + 3).trim();
    const fm = {};
    for (const line of fmText.split('\n')) {
        if (!line.includes(':')) continue;
        let [key, val] = line.split(':', 1);
        key = key.trim().toLowerCase();
        val = val.trim();
        if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
        fm[key] = val;
    }
    return { frontmatter: fm, body };
}
</script>

</body>
</html>
